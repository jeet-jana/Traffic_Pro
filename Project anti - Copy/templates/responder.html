<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TransitOS | Responder</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        * { box-sizing: border-box; }

        .responder-app {
            position: relative;
            height: 100%;
            width: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: #0a0e1a;
            font-family: 'Inter', sans-serif;
        }

        /* ── TOP HUD ── */
        .hud-top {
            position: absolute;
            top: 14px; left: 50%;
            transform: translateX(-50%);
            width: 90%;
            z-index: 1000;
        }
        .signal-status {
            background: rgba(16,185,129,0.15);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(16,185,129,0.4);
            color: #fff;
            padding: 10px 14px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 0 20px rgba(16,185,129,0.3);
        }
        .signal-status ion-icon { font-size: 22px; color: #10b981; flex-shrink: 0; }
        .signal-status h4 { font-size: 12px; margin: 0; color: #10b981; text-transform: uppercase; letter-spacing: 1px; }
        .signal-status p  { font-size: 11px; margin: 0; opacity: 0.75; }

        /* ── MAP ── */
        #responder-map { flex-grow: 1; width: 100%; z-index: 1; }

        /* ══════════════════════════════════════════════
           ROUTE STATUS BAR  — the main new feature
           Always visible between map and bottom nav
        ══════════════════════════════════════════════ */
        .route-status-bar {
            position: absolute;
            bottom: 102px;           /* sits just above bottom nav */
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            background: rgba(15,23,42,0.96);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 10px 14px;
            z-index: 1001;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 30px rgba(0,0,0,0.6);
        }

        /* Start / End node display chips */
        .route-node {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            cursor: pointer;
            padding: 6px 8px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.04);
            transition: background 0.2s;
            min-width: 0;
        }
        .route-node:hover { background: rgba(255,255,255,0.10); }
        .route-node .rn-label {
            font-size: 9px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #64748b;
            margin-bottom: 2px;
        }
        .route-node .rn-val {
            font-size: 17px;
            font-weight: 800;
            color: #f1f5f9;
        }
        .route-node.start-node .rn-val { color: #60a5fa; }
        .route-node.end-node   .rn-val { color: #f87171; }
        .route-node .rn-hint {
            font-size: 9px;
            color: #475569;
            margin-top: 1px;
        }

        /* Arrow in the middle */
        .route-arrow {
            color: #475569;
            font-size: 18px;
            flex-shrink: 0;
        }

        /* Dispatch button inside status bar */
        .dispatch-inline-btn {
            background: #22c55e;
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 8px 12px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            flex-shrink: 0;
            transition: all 0.2s;
            box-shadow: 0 3px 12px rgba(34,197,94,0.4);
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .dispatch-inline-btn:hover { background: #16a34a; transform: scale(1.04); }
        .dispatch-inline-btn:disabled {
            background: #1e293b;
            color: #475569;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }
        .dispatch-inline-btn ion-icon { font-size: 14px; }

        /* ── NODE PICKER MODAL ── */
        .picker-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            z-index: 2000;
            display: none;
            align-items: flex-end;
        }
        .picker-overlay.active { display: flex; }

        .picker-panel {
            width: 100%;
            background: rgba(10,16,32,0.99);
            border-top: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px 20px 0 0;
            padding: 18px 16px 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            animation: panelUp 0.35s cubic-bezier(0.175,0.885,0.32,1.275);
            box-shadow: 0 -12px 50px rgba(0,0,0,0.8);
        }
        @keyframes panelUp {
            from { transform: translateY(100%); }
            to   { transform: translateY(0); }
        }

        .picker-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .picker-header h3 {
            margin: 0;
            font-size: 15px;
            font-weight: 700;
            color: #f1f5f9;
        }
        .picker-close {
            background: rgba(255,255,255,0.08);
            border: none;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            color: #94a3b8;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Mode toggle */
        .picker-mode-row { display: flex; gap: 8px; }
        .mode-btn {
            flex: 1;
            padding: 9px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.08);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            color: #64748b;
            background: rgba(255,255,255,0.04);
            transition: all 0.2s;
        }
        .mode-btn.sel-start { background: rgba(59,130,246,0.2); border-color: #3b82f6; color: #93c5fd; }
        .mode-btn.sel-end   { background: rgba(239,68,68,0.2);  border-color: #ef4444; color: #fca5a5; }

        .picker-hint {
            font-size: 11px;
            color: #475569;
            text-align: center;
            margin: -4px 0;
        }

        /* 5×5 node grid */
        .node-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
        }
        .nd-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.09);
            border-radius: 9px;
            padding: 8px 4px;
            font-size: 12px;
            font-weight: 700;
            color: #94a3b8;
            cursor: pointer;
            text-align: center;
            transition: all 0.15s;
            line-height: 1;
        }
        .nd-btn:hover      { background: rgba(255,255,255,0.12); color: #f1f5f9; }
        .nd-btn.sel-start  { background: rgba(59,130,246,0.3); border-color: #3b82f6; color: #bfdbfe; }
        .nd-btn.sel-end    { background: rgba(239,68,68,0.3);  border-color: #ef4444; color: #fecaca; }
        .nd-btn.sel-both   { background: linear-gradient(135deg,rgba(59,130,246,0.3),rgba(239,68,68,0.3));
                              border-color: #a78bfa; color: #ddd6fe; }

        .picker-dispatch-btn {
            padding: 13px;
            border-radius: 13px;
            border: none;
            background: #22c55e;
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 18px rgba(34,197,94,0.45);
        }
        .picker-dispatch-btn:hover { background: #16a34a; }
        .picker-dispatch-btn:disabled {
            background: #1e293b; color: #475569;
            box-shadow: none; cursor: not-allowed;
        }

        /* ── BOTTOM NAV ── */
        .hud-bottom {
            position: absolute;
            bottom: 14px; left: 50%;
            transform: translateX(-50%);
            width: 92%;
            background: rgba(15,23,42,0.95);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 18px;
            padding: 14px 18px;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 30px rgba(0,0,0,0.5);
        }
        .nav-stats { display: flex; align-items: baseline; gap: 6px; }
        .nav-stats .eta { font-size: 32px; font-weight: 800; color: #f1f5f9; line-height: 1; }
        .nav-stats .eta-label { font-size: 13px; color: #3b82f6; font-weight: 600; }
        .nav-details { display: flex; flex-direction: column; gap: 3px; }
        .nav-details span { font-size: 12px; color: #64748b; }
        .nav-details .dest-label { font-size: 12px; color: #f1f5f9; font-weight: 600; }

        .voice-btn {
            background: #3b82f6; color: white;
            width: 48px; height: 48px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; border: none; cursor: pointer;
            box-shadow: 0 4px 15px rgba(59,130,246,0.5);
            transition: transform 0.2s;
            flex-shrink: 0;
        }
        .voice-btn:active { transform: scale(0.9); }

        .back-nav {
            position: absolute; top: -50px; left: 0;
            color: #94a3b8; text-decoration: none;
            display: flex; align-items: center; gap: 5px; font-size: 14px;
        }
        .back-nav:hover { color: #f1f5f9; }
    </style>
</head>
<body>
    <div class="app-container" style="background:#0a0e1a;">
        <div class="mobile-simulator">
            <div class="device-frame">
                <a href="/" class="back-nav"><ion-icon name="arrow-back"></ion-icon> Portal</a>

                <div class="responder-app">

                    <!-- Top HUD -->
                    <div class="hud-top">
                        <div class="signal-status">
                            <ion-icon name="radio-outline" id="hud-icon"></ion-icon>
                            <div class="status-text">
                                <h4 id="hud-title">System Initializing…</h4>
                                <p  id="hud-desc">Configuring autonomous patrol.</p>
                            </div>
                        </div>
                    </div>

                    <!-- Map -->
                    <div id="responder-map"></div>

                    <!-- ═══ ROUTE STATUS BAR ═══ -->
                    <div class="route-status-bar" id="route-status-bar">
                        <!-- Start node chip — tap to change -->
                        <div class="route-node start-node" id="chip-start" title="Tap to set start node">
                            <span class="rn-label">Start</span>
                            <span class="rn-val"  id="chip-start-val">--</span>
                            <span class="rn-hint">tap to set</span>
                        </div>

                        <ion-icon class="route-arrow" name="arrow-forward"></ion-icon>

                        <!-- End node chip — tap to change -->
                        <div class="route-node end-node" id="chip-end" title="Tap to set destination">
                            <span class="rn-label">Destination</span>
                            <span class="rn-val"  id="chip-end-val">--</span>
                            <span class="rn-hint">tap to set</span>
                        </div>

                        <!-- Dispatch button -->
                        <button class="dispatch-inline-btn" id="dispatch-inline" disabled>
                            <ion-icon name="flash"></ion-icon> Go
                        </button>
                    </div>

                    <!-- ═══ NODE PICKER MODAL ═══ -->
                    <div class="picker-overlay" id="picker-overlay">
                        <div class="picker-panel">
                            <div class="picker-header">
                                <h3 id="picker-title">Select Node</h3>
                                <button class="picker-close" id="picker-close">✕</button>
                            </div>

                            <!-- Start / End toggle -->
                            <div class="picker-mode-row">
                                <button class="mode-btn sel-start" id="mode-start">🟦 Set Start</button>
                                <button class="mode-btn" id="mode-end">🟥 Set Destination</button>
                            </div>

                            <p class="picker-hint" id="picker-hint">Tap a node to set as <b>Start</b></p>

                            <!-- 5×5 node buttons -->
                            <div class="node-grid" id="node-grid"></div>

                            <button class="picker-dispatch-btn" id="picker-dispatch" disabled>
                                🚑 Dispatch Emergency Vehicle
                            </button>
                        </div>
                    </div>

                    <!-- Bottom Nav -->
                    <div class="hud-bottom">
                        <div>
                            <div class="nav-stats">
                                <div class="eta" id="live-eta">--</div>
                                <div class="eta-label">min</div>
                            </div>
                            <div class="nav-details">
                                <span><span id="live-dist">--</span> mi · <span id="live-speed">0</span> mph</span>
                                <span class="dest-label" id="live-dest">Awaiting dispatch…</span>
                            </div>
                        </div>
                        <button class="voice-btn" id="voice-nav-toggle">
                            <ion-icon name="volume-high"></ion-icon>
                        </button>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="{{ url_for('static', filename='js/responder.js') }}"></script>
    {% include 'ai_assistant.html' %}
</body>
</html>
