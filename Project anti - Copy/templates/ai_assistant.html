<style>
/* Global AI Assistant Styles */
.global-ai-wrapper {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 10000;
  font-family: 'Inter', sans-serif;
  color: #f8fafc;
}

/* Adjust position on screens where it might overlap */
@media (max-width: 1024px) {
  .global-ai-wrapper {
    bottom: 90px;
    right: 20px;
  }
}

.global-ai-fab {
  width: 65px;
  height: 65px;
  border-radius: 50%;
  background: linear-gradient(135deg, #ec4899, #8b5cf6);
  box-shadow: 0 4px 20px rgba(236, 72, 153, 0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 32px;
  cursor: pointer;
  transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease;
  border: 2px solid rgba(255, 255, 255, 0.2);
}

.global-ai-fab:hover {
  transform: scale(1.1) translateY(-5px);
  box-shadow: 0 8px 30px rgba(139, 92, 246, 0.6);
}

.global-ai-fab.pulse-anim {
  animation: globalFabPulse 2.5s infinite;
}

@keyframes globalFabPulse {
  0% { box-shadow: 0 0 0 0 rgba(236, 72, 153, 0.7); }
  70% { box-shadow: 0 0 0 20px rgba(236, 72, 153, 0); }
  100% { box-shadow: 0 0 0 0 rgba(236, 72, 153, 0); }
}

.global-ai-chat-window {
  position: absolute;
  bottom: 85px;
  right: 0;
  width: 360px;
  height: 520px;
  max-height: calc(100vh - 120px);
  background: rgba(15, 23, 42, 0.88);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid rgba(255, 255, 255, 0.12);
  border-radius: 24px;
  box-shadow: 0 15px 50px rgba(0, 0, 0, 0.6);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  opacity: 0;
  pointer-events: none;
  transform: translateY(20px) scale(0.95);
  transform-origin: bottom right;
  transition: all 0.35s cubic-bezier(0.19, 1, 0.22, 1);
}

.global-ai-chat-window.active {
  opacity: 1;
  pointer-events: all;
  transform: translateY(0) scale(1);
}

.global-ai-header {
  padding: 18px 22px;
  background: linear-gradient(90deg, rgba(236, 72, 153, 0.15), rgba(139, 92, 246, 0.15));
  border-bottom: 1px solid rgba(255, 255, 255, 0.08);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.global-ai-header-title {
  display: flex;
  align-items: center;
  gap: 12px;
  font-family: 'Outfit', sans-serif;
  font-weight: 700;
  font-size: 17px;
  color: #f8fafc;
  letter-spacing: 0.5px;
}

.global-ai-status-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background-color: #10b981;
  box-shadow: 0 0 10px #10b981;
}

.global-ai-close-btn {
  background: rgba(255, 255, 255, 0.1);
  border: none;
  border-radius: 50%;
  width: 32px;
  height: 32px;
  color: #e2e8f0;
  font-size: 18px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
}

.global-ai-close-btn:hover {
  background: rgba(239, 68, 68, 0.8);
  transform: rotate(90deg);
}

.global-ai-messages {
  flex-grow: 1;
  padding: 20px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.global-ai-messages::-webkit-scrollbar { width: 5px; }
.global-ai-messages::-webkit-scrollbar-track { background: transparent; }
.global-ai-messages::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.15); border-radius: 10px; }

.global-ai-msg {
  max-width: 85%;
  padding: 14px 18px;
  border-radius: 18px;
  font-size: 14px;
  line-height: 1.5;
  animation: globalMsgFadeIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
}

@keyframes globalMsgFadeIn {
  from { opacity: 0; transform: translateY(15px); }
  to { opacity: 1; transform: translateY(0); }
}

.global-ai-msg.bot {
  background: rgba(255, 255, 255, 0.06);
  color: #e2e8f0;
  border-bottom-left-radius: 4px;
  align-self: flex-start;
  border: 1px solid rgba(255, 255, 255, 0.08);
}

.global-ai-msg.user {
  background: linear-gradient(135deg, #ec4899, #8b5cf6);
  color: #ffffff;
  border-bottom-right-radius: 4px;
  align-self: flex-end;
  box-shadow: 0 4px 15px rgba(236, 72, 153, 0.3);
}

.global-ai-input-area {
  padding: 16px 20px;
  background: rgba(0, 0, 0, 0.3);
  border-top: 1px solid rgba(255, 255, 255, 0.08);
  display: flex;
  gap: 12px;
}

.global-ai-input {
  flex-grow: 1;
  background: rgba(255, 255, 255, 0.06);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 20px;
  padding: 12px 18px;
  color: #f8fafc;
  font-family: inherit;
  font-size: 14px;
  outline: none;
  transition: all 0.2s;
}

.global-ai-input:focus {
  border-color: #ec4899;
  background: rgba(255, 255, 255, 0.1);
  box-shadow: 0 0 15px rgba(236, 72, 153, 0.2);
}

.global-ai-send-btn {
  background: linear-gradient(135deg, #ec4899, #8b5cf6);
  color: white;
  border: none;
  border-radius: 50%;
  width: 44px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 4px 12px rgba(139, 92, 246, 0.4);
  font-size: 18px;
}

.global-ai-send-btn:hover {
  transform: scale(1.1);
  box-shadow: 0 6px 16px rgba(139, 92, 246, 0.6);
}

.global-ai-suggestions {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 10px;
}

.global-ai-suggestion-chip {
  background: rgba(236, 72, 153, 0.15);
  border: 1px solid rgba(236, 72, 153, 0.3);
  color: #fbcfe8;
  padding: 6px 14px;
  border-radius: 100px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
}

.global-ai-suggestion-chip:hover {
  background: rgba(236, 72, 153, 0.3);
  color: #ffffff;
  transform: translateY(-2px);
}

@media (max-width: 480px) {
  .global-ai-chat-window {
    position: fixed;
    bottom: 0;
    right: 0;
    width: 100vw;
    height: 100vh;
    max-height: 100vh;
    border-radius: 0;
  }
}
</style>

<div class="global-ai-wrapper">
    <div class="global-ai-chat-window" id="global-ai-chat-window">
        <div class="global-ai-header">
            <div class="global-ai-header-title">
                <span class="global-ai-status-dot"></span>
                TransitOS Guardian AI
            </div>
            <button class="global-ai-close-btn" id="global-ai-close-btn">
                <ion-icon name="close-outline"></ion-icon>
            </button>
        </div>
        <div class="global-ai-messages" id="global-ai-messages">
            <div class="global-ai-msg bot">
                Greetings! I am the Guardian AI for TransitOS. I have full control of this interface and can guide you. What would you like to explore?
                <div class="global-ai-suggestions">
                    <div class="global-ai-suggestion-chip">Go to Operator Hub</div>
                    <div class="global-ai-suggestion-chip">Open Responder App</div>
                    <div class="global-ai-suggestion-chip">Trigger UI Highlight</div>
                    <div class="global-ai-suggestion-chip">Show Emergency Alert</div>
                </div>
            </div>
        </div>
        <div class="global-ai-input-area">
            <input type="text" class="global-ai-input" id="global-ai-input" placeholder="Give me a command...">
            <button class="global-ai-send-btn" id="global-ai-send-btn">
                <ion-icon name="send"></ion-icon>
            </button>
        </div>
    </div>
    
    <div class="global-ai-fab pulse-anim" id="global-ai-fab">
        <ion-icon name="planet"></ion-icon>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const fab = document.getElementById('global-ai-fab');
    const chatWindow = document.getElementById('global-ai-chat-window');
    const closeBtn = document.getElementById('global-ai-close-btn');
    const messagesBox = document.getElementById('global-ai-messages');
    const inputField = document.getElementById('global-ai-input');
    const sendBtn = document.getElementById('global-ai-send-btn');

    // Make sure icons are loaded
    if (!document.querySelector('script[src*="ionicons"]')) {
        const script1 = document.createElement('script');
        script1.type = 'module';
        script1.src = 'https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js';
        document.head.appendChild(script1);
        
        const script2 = document.createElement('script');
        script2.setAttribute('nomodule', '');
        script2.src = 'https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js';
        document.head.appendChild(script2);
    }

    // Toggle chat window
    fab.addEventListener('click', () => {
        chatWindow.classList.toggle('active');
        if(chatWindow.classList.contains('active')) {
            fab.classList.remove('pulse-anim');
            inputField.focus();
        }
    });

    closeBtn.addEventListener('click', () => {
        chatWindow.classList.remove('active');
    });

    // Add message to chat UI
    function addMessage(text, sender) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `global-ai-msg ${sender}`;
        msgDiv.textContent = text;
        messagesBox.appendChild(msgDiv);
        messagesBox.scrollTop = messagesBox.scrollHeight;
    }

    // Process user command and control site
    function processCommand(text) {
        const lowerText = text.toLowerCase();
        
        // Simulating thinking delay
        setTimeout(() => {
            if (lowerText.includes('operator')) {
                addMessage('Understood. Taking you to the Operator Command Center.', 'bot');
                setTimeout(() => window.location.href = '/operator', 1200);
            } else if (lowerText.includes('responder')) {
                addMessage('Affirmative. Connecting you to the Responder App.', 'bot');
                setTimeout(() => window.location.href = '/responder', 1200);
            } else if (lowerText.includes('citizen')) {
                addMessage('Initializing the Citizen GPS application.', 'bot');
                setTimeout(() => window.location.href = '/citizen', 1200);
            } else if (lowerText.includes('home') || lowerText.includes('portal')) {
                addMessage('Returning to the TransitOS main portal.', 'bot');
                setTimeout(() => window.location.href = '/', 1200);
            } else if (lowerText.includes('highlight') || lowerText.includes('control')) {
                addMessage('Executing interface highlight override.', 'bot');
                // Target various elements depending on which page we are on
                const interactables = document.querySelectorAll('.glass-button, .portal-card, .metric-block, .stat-card, .cit-go-btn, .dispatch-inline-btn, button');
                interactables.forEach(el => {
                    const oldStyle = el.style.boxShadow;
                    el.style.boxShadow = '0 0 25px 8px #f59e0b';
                    el.style.transition = 'all 0.4s';
                    setTimeout(() => el.style.boxShadow = oldStyle, 2500);
                });
            } else if (lowerText.includes('alert') || lowerText.includes('emergency')) {
                addMessage('Triggering global simulated alert state.', 'bot');
                const overlay = document.createElement('div');
                overlay.style.position = 'fixed';
                overlay.style.inset = '0';
                overlay.style.boxShadow = 'inset 0 0 100px 30px rgba(239, 68, 68, 0.7)';
                overlay.style.pointerEvents = 'none';
                overlay.style.zIndex = '9999';
                overlay.style.transition = 'opacity 0.5s';
                document.body.appendChild(overlay);
                setTimeout(() => {
                    overlay.style.opacity = '0';
                    setTimeout(() => overlay.remove(), 500);
                }, 3000);
            } else {
                addMessage("I am the Guardian AI. I have full control over the TransitOS grid. Try asking to navigate to 'Operator', 'Responder', 'Citizen', or command me to 'highlight' elements or simulate an 'emergency alert'.", 'bot');
            }
        }, 700);
    }

    // Handle sending message
    function sendMessage() {
        const text = inputField.value.trim();
        if (text) {
            addMessage(text, 'user');
            inputField.value = '';
            processCommand(text);
        }
    }

    sendBtn.addEventListener('click', sendMessage);
    inputField.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });

    // Handle suggested chips
    document.querySelectorAll('.global-ai-suggestion-chip').forEach(chip => {
        chip.addEventListener('click', () => {
            const text = chip.textContent;
            addMessage(text, 'user');
            processCommand(text);
        });
    });
});
</script>
